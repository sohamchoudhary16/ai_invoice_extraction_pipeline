# configs/config.yaml

ocr:
  confidence_threshold: 60
  dpi: 300
  tesseract_psm: 6
  lang: "deu+eng"

vision:
  VISION_THRESHOLD: 0.80

ollama:
  model: "gemma3:4b"
  base_url: "http://localhost:11434"
  temperature: 0
  timeout: 1800
  vision_model: "gemma3:4b"   # vision-capable model for low-confidence fallback

pipeline:
  skip_digital_pdf_ocr: true
  max_pages_per_doc: 50

output:
  formats: [json, csv, sql]
  json_indent: 2
  sqlite_db: "output/extractions.db"

logging:
  level: "INFO"
  log_file: "logs/logs.txt"

input_dir: "sample_pdf/scan"
